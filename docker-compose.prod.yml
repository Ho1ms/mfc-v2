name: mfc-max-prod


services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: runtime
    image: mfc-max/backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: api
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
    ports:
      - "127.0.0.1:7701:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  worker:
    build:
      context: ./backend
      target: runtime
    image: mfc-max/backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: worker
      APP_ENV: production
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
    command: ["python", "-m", "app.workers.run"]

  bot:
    build:
      context: ./bot
      target: runtime
    image: mfc-max/bot:latest
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
    - "127.0.0.1:7700:8080"


  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
        VITE_MAX_BOT_USERNAME: ${MAX_BOT_USERNAME}
    image: mfc-max/frontend-admin:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:7702:80"

  frontend-miniapp:
    build:
      context: ./frontend-miniapp
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
        VITE_WEBAPP_URL: ${PUBLIC_WEBAPP_URL}
        MAX_BOT_USERNAME: ${MAX_BOT_USERNAME}
        VITE_SITE_URL: ${PUBLIC_ADMIN_URL}
    image: mfc-max/frontend-miniapp:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:7703:80"

volumes:
  db-data:
  redis-data:
  uploads-data:
