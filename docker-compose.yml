name: mfc-max

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
      - ./backend:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: worker
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
      - ./backend:/app
    command: ["python", "-m", "app.workers.run"]

  bot:
    build:
      context: ./bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./bot:/app

  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
        VITE_MAX_BOT_USERNAME: ${MAX_BOT_USERNAME}

    restart: unless-stopped
    ports:
      - "5173:80"

  frontend-miniapp:
    build:
      context: ./frontend-miniapp
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
        VITE_WEBAPP_URL: ${PUBLIC_WEBAPP_URL}
        MAX_BOT_USERNAME: ${MAX_BOT_USERNAME}
        VITE_SITE_URL: ${PUBLIC_ADMIN_URL}
    restart: unless-stopped
    ports:
      - "5174:80"

  # Standalone webapp — тот же образ, что и frontend-miniapp, но без MAX-bridge.
  # Открывается напрямую в браузере, вход через deeplink в MAX.
  frontend-webapp:
    build:
      context: ./frontend-miniapp
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
        VITE_WEBAPP_URL: ${PUBLIC_WEBAPP_URL}
        VITE_MAX_BOT_USERNAME: ${MAX_BOT_USERNAME}
    restart: unless-stopped
    ports:
      - "5175:80"

volumes:
  db-data:
  redis-data:
  uploads-data:
